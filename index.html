<title>Locked</title>
<link rel="preload" as="video" href="1.mp4" type="video/mp4">

<style>
  :root{
    --bg-0:#06070d;--ink:#e8ecf6;--ink-dim:#a4adc7;--line:rgba(255,255,255,.08);
    --acc-1:#ff5e7a;--acc-2:#7c5cff;--acc-3:#27e0c5;
    --grad:linear-gradient(120deg,var(--acc-1),var(--acc-2) 45%,var(--acc-3));
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --sans:"Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg-0);color:var(--ink);font-family:var(--sans)}
  .bg{position:fixed;inset:0;z-index:-1;overflow:hidden;background:var(--bg-0)}
  .bg::before{content:"";position:absolute;inset:-20%;filter:blur(60px);
    background:
      radial-gradient(40% 35% at 20% 30%,rgba(124,92,255,.55),transparent 60%),
      radial-gradient(35% 30% at 80% 20%,rgba(255,94,122,.45),transparent 65%),
      radial-gradient(45% 40% at 60% 80%,rgba(39,224,197,.35),transparent 60%);
    animation:drift 28s linear infinite;
  }
  @keyframes drift{0%{transform:translate3d(0,0,0) rotate(0deg)}50%{transform:translate3d(-4%,3%,0) rotate(8deg)}100%{transform:translate3d(0,0,0) rotate(0deg)}}
  .center{min-height:100vh;display:grid;place-items:center;padding:24px}
  form{
    width:100%;max-width:420px;padding:36px 32px;
    border:1px solid var(--line);border-radius:22px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
    backdrop-filter:blur(10px);
    box-shadow:0 30px 80px -20px rgba(124,92,255,.35);
  }
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:10px}
  h1{font-size:22px;margin:0 0 18px;letter-spacing:-.01em;font-weight:600}
  label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
  input[type=password]{
    width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:12px;
    background:rgba(255,255,255,.04);color:var(--ink);font-family:var(--mono);font-size:15px;
    outline:0;transition:border-color .2s,background .2s;
  }
  input[type=password]:focus{border-color:rgba(124,92,255,.7);background:rgba(124,92,255,.06)}
  button{
    margin-top:18px;width:100%;padding:14px 16px;border:0;border-radius:12px;cursor:pointer;
    background:var(--grad);color:#0b0d17;font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:.02em;
    transition:transform .15s,filter .2s;
  }
  button:hover{filter:brightness(1.08)}
  button:active{transform:scale(.98)}
  button:disabled{opacity:.55;cursor:wait}
  .err{margin-top:14px;color:#ff8aa0;font-size:13px;font-family:var(--mono);min-height:18px}
  .hint{margin-top:18px;font-size:12px;color:var(--ink-dim);line-height:1.5}
</style>
</head>

    </form>

  const ITERS    = 250000;

  function b64ToBytes(b64){
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function deriveKey(pw, salt){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations: ITERS, hash:'SHA-256' },
      baseKey,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );
  }

  async function unlock(pw){
    const salt = b64ToBytes(SALT_B64);
    const iv   = b64ToBytes(IV_B64);
    const ct   = b64ToBytes(CT_B64);
    const key  = await deriveKey(pw, salt);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    const html = new TextDecoder('utf-8').decode(plain);
    // Replace the whole document with the decrypted page
    document.open();
    document.write(html);
    document.close();
  }

  const form = document.getElementById('gate');
  const pw = document.getElementById('pw');
  const btn = document.getElementById('go');
  const err = document.getElementById('err');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Unlocking...';
    try{
      await unlock(pw.value);
    }catch(ex){
      err.textContent = 'Wrong password. Try again.';
      btn.disabled = false; btn.textContent = 'Unlock';
      pw.select();
    }
  });
})();
